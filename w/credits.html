<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cubyy - Credits </title>
    <link rel="icon" type="image/png" href="../media/icons/icon.png">
    <link rel="stylesheet" href="../styles/m3-styles.css">
    <link rel="stylesheet" href="../styles/styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
	<meta name="apple-mobile-web-app-title" content="Cubyy">
	<link rel="apple-touch-icon" href="../media/icons/icon.png">
    <link rel="manifest" href="../manifest.json">
    <style>
        body {
            justify-content: flex-start;
        }
        .credits-label {
            font-family: sans-serif, 'Google Sans'; font-weight: bold; font-size: 30px; color: #312252;
        }
        @media (prefers-color-scheme: dark) {
        .credits-label {
           color:   #E6E1E5; font-family: sans-serif, 'Google Sans'; font-weight: bold; font-size: 30px; 
        }
        }
    </style>
</head>
<body ontouchstart="">
    <div class="m3-card2"> 
        <p class="credits-label"> Credits </p>
        <p> List of credits ☺️ </p>
        <div class='rows-box'>
            <hr class="rows-hr">
            <p onclick="window.location.href='https://fonts.google.com'" style=" cursor: pointer;"> Icons & "Google Sans" font by <b>Google</b></p>
            <hr class="rows-hr">
            <p onclick="window.location.href='https://m3.material.io/'" style=" cursor: pointer;"> <B>Material 3</B> Design like design inspirated from <b>Google</b> </p>
            <hr class="rows-hr">
            <p onclick="window.location.href='https://github.com/franekk3'" style=" cursor: pointer;"> Cubyy by <b> Franekk3 </b></a>  </p>
            <hr class="rows-hr">

        </div>

    </div>

    <div  class="nav-bar">
        <div onclick="window.location.href='../index.html'; navigator.vibrate(100)" class="nav-bar-element"> 
            <img id="home-button" class="nav-bar-image " src="../media/icons/home.png">
            <p class="nav-bar-label" > Home </p>
        </div>
        <div onclick="window.location.href='../times.html'; navigator.vibrate(100)" class="nav-bar-element"> 
            <img id="add-button" class="nav-bar-image" src="../media/icons/list.png">
            <p class="nav-bar-label"> Times </p>
        </div>
        <div onclick="window.location.href='../settings.html'; navigator.vibrate(100)" class="nav-bar-element"> 
            <img id="account-button" class="nav-bar-image nav-bar-image-choosed" src="../media/icons/settings_filled.png">
            <p class="nav-bar-label"> Settings </p>
        </div>
    </div>


    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.getElementById('home-button').src = '../media/dm/home.png';
            document.getElementById('add-button').src = '../media/dm/list.png';
            document.getElementById('account-button').src = '../media/dm/settings_filled.png';
        } else {
            document.getElementById('home-button').src = '../media/icons/home.png';
            document.getElementById('add-button').src = '../media/icons/list.png';
            document.getElementById('account-button').src = '../media/icons/settings_filled.png';
        }
         function isMobileDevice() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.matchMedia("(max-width: 768px)").matches; } 
 function loadCSS(file) { const link = document.createElement("link"); link.rel = "stylesheet"; link.href = file; document.head.appendChild(link); } 
 if (isMobileDevice()) { loadCSS("../styles/style-mobile.css"); } else { loadCSS("../styles/style-desktop.css"); }

 if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('../sw.js')
            .then(reg => console.log('Service Worker is already registered!', reg))
            .catch(err => console.log('Error reghistering SW:', err));
    });
}
    </script>
</body>
</html>
