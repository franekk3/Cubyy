<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cubyy </title>
    <link rel="icon" type="image/png" href="./media/icons/icon.png">
    <link rel="stylesheet" href="./styles/m3-styles.css">
    <link rel="stylesheet" href="./styles/styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
	<meta name="apple-mobile-web-app-title" content="Cubyy">
	<link rel="apple-touch-icon" href="./media/icons/icon.png">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="m3-card2">
        <p id="scramble"> scramble </p>
    </div>
    <div class="m3-card" style="height: 60%;">
        <button class="bluetooth-button" onclick="connectBluetooth()"><img id="bluetoothIcon" height="30px" width="30px" src="./media/icons/bluetooth.png" alt="Connect Bluetooth timer"></button>
        <div class="timer-display" id="timerDisplay" ontouchstart="handleTouchStart(event)" ontouchend="handleTouchEnd(event)" style="font-weight: bold; user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;"><span id="timerNumbers">0.000</span>
            <p id="last-solve" style="display: none; text-align: center; font-family: 'Google Sans'; color: #49454F; margin-top: 10px; font-size: 14px;"></p>
            <div id="options-bar"  class="options-bar" ontouchstart="event.stopPropagation()">
                <img id="add2tosolve" class="options-bar-icon" src="./media/icons/+2.png">
                <img id="addDnfToSolve" class="options-bar-icon" src="./media/icons/block.png">
                <img id="deleteSolve" class="options-bar-icon" src="./media/icons/delete.png">
            </div>
        </div>
        
        <div class="spinner-container" style="    left: 50%;    position: absolute;     top: 0px;

    transform: translateX(-50%);"> 
            <div class="spiner-part1"> 3x3 </div>
            <div class="spiner-part2"> <img height="30px" width="30px" src="./media/icons/arrow_down.png"> </div>
        </div>
    </div>

    


    <div id="gantimerInfo" style="display: none; margin-top: 10px; padding: 10px; background: #e3f2fd; border: 1px solid #2196F3; border-radius: 16px;">
        <strong>GanTimer Info:</strong><br>
        <div id="gantimerState">-</div>
    </div>
    
        <div class="spinner-container" style="margin-top: 0px; position: absolute; bottom: 22%;"> 
            <div class="spiner-part1"> Your times: </div>
            
            <div onclick='timesListClick()' class="spiner-part2"> <img id="timesListIcon" height="30px" width="30px" style="rotate: 0deg;" src="./media/icons/arrow_down.png"> </div>
        </div>
        
    <div id="timesList2"class="m3-card2" style=" padding: 10px; max-height: 200px; overflow-y: auto; display: none;">
        <button onclick="deleteAllTimes()" class="m3-FilledTonalButtonWithAnimatedShapeSample" style="scale: 1; margin: 0 auto; margin-bottom: 10px;"> Delete All Times</button>
    
        <div id="timesList"></div>
    </div>
    <p style="margin: 50px"> </p>
    <div id="notificationsBox" class="notification">
            <p>  </p>
    </div>
    <div  class="nav-bar">
        <div onclick="window.location.href='./index.html'; navigator.vibrate(100)" class="nav-bar-element"> 
            <img id="home-button" class="nav-bar-image nav-bar-image-choosed" src="./media/icons/home_filled.png">
            <p class="nav-bar-label" > Home </p>
        </div>
        <div onclick="window.location.href='./times.html'; navigator.vibrate(100)" class="nav-bar-element"> 
            <img id="add-button" class="nav-bar-image" src="./media/icons/list.png">
            <p class="nav-bar-label"> Times </p>
        </div>
        <div onclick="window.location.href='./settings.html'; navigator.vibrate(100)" class="nav-bar-element"> 
            <img id="account-button" class="nav-bar-image" src="./media/icons/settings.png">
            <p class="nav-bar-label"> Settings </p>
        </div>
    </div>


    <script src="./script.js"></script>
</body>
</html>
