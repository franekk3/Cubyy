    <script>
        
        const OverLay = document.getElementById('overlay');
        const TimesListPupUp = document.getElementById('main-container');
        const handle = document.getElementById('drag-handle');
const shield = document.getElementById('iframe-shield');
let startY = 0;
let isDragging = false;

// --- FUNKCJE POMOCNICZE ---
function enableShield(on) {
    shield.style.display = on ? 'block' : 'none';
}

// --- OBSŁUGA DOTYKU (Mobile) ---
handle.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    isDragging = true;
    enableShield(true); // Nakładamy tarczę, by ruch palca nie uciekł do iframe
}, { passive: true });

window.addEventListener('touchend', e => {
    if (!isDragging) return;
    
    const endY = e.changedTouches[0].clientY;
    handleGesture(startY, endY);
    
    isDragging = false;
    enableShield(false); // Zdejmujemy tarczę - iframe znów jest w pełni interaktywny
}, { passive: true });

// --- OBSŁUGA MYSZY (PC) ---
handle.addEventListener('mousedown', e => {
    startY = e.clientY;
    isDragging = true;
    enableShield(true);

    const onMouseUp = (upEvent) => {
        handleGesture(startY, upEvent.clientY);
        isDragging = false;
        enableShield(false);
        window.removeEventListener('mouseup', onMouseUp);
    };
    
    window.addEventListener('mouseup', onMouseUp);
});

function handleGesture(start, end) {
    const threshold = 50;
    const diff = end - start;
    if (Math.abs(diff) > threshold) {
        if (diff > 0) hideTimesListPupUp();
        else funkcjaDlaGory();
    }
}

function hideTimesListPupUp() { 
    enableScroll()
    OverLay.classList.add('hidden2');
    TimesListPupUp.classList.add('anim-close');
        setTimeout(() => {
        TimesListPupUp.classList.add('hidden2');
}, 300);
}
function showTimesListPupUp() { 
    disableScroll()
    TimesListPupUp.classList.remove('hidden2');
    TimesListPupUp.classList.remove('anim-close');
    OverLay.classList.remove('hidden2');
    
}
function disableScroll() {
  document.body.classList.add('no-scroll');
}

function enableScroll() {
  document.body.classList.remove('no-scroll');
}

    </script>
